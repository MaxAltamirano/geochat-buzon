<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoChat | Sistema Nervioso Central</title>
    <style>
        :root {
            --gold: #d4af37;
            --neon: #00ff41;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
        }

        .gold {
            color: var(--gold);
            text-shadow: 0 0 10px var(--gold);
        }

        .neon {
            color: var(--neon);
            text-shadow: 0 0 10px var(--neon);
        }

        .capa {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            transition: opacity 1.5s ease-in-out;
            z-index: 1;
        }

        .oculto {
            opacity: 0;
            pointer-events: none;
        }

        .visible {
            opacity: 1;
            pointer-events: auto;
            z-index: 10;
        }

        /* Estilos optimizados */
        #status-panel {
            border: 1px solid var(--gold) !important;
            background: rgba(0, 0, 0, 0.8) !important;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        .log-entry {
            color: var(--neon);
            font-size: 11px;
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid rgba(0, 255, 65, 0.1);
            animation: pulse-green 2s infinite;
        }

        #modal-movil {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.98);
            z-index: 5000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .box-comando {
            background: #111;
            border: 1px solid var(--gold);
            padding: 15px;
            margin: 15px 0;
            font-size: 12px;
            color: var(--neon);
            width: 90%;
            word-break: break-all;
            border-radius: 5px;
            cursor: pointer;
        }

        #valvula-escape {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 2000;
            transition: all 0.5s ease;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .pelos {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border-top: 2px solid var(--gold);
            animation: girar-pelos 1s linear infinite;
        }

        @keyframes girar-pelos {
            from {
                transform: rotate(0deg) scale(1);
            }

            to {
                transform: rotate(360deg) scale(1.1);
            }
        }

        @keyframes pulse-green {
            0% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.5;
            }
        }

        .estado-online {
            color: var(--gold) !important;
            text-shadow: 0 0 15px var(--gold);
        }

        .modo-tesla {
            opacity: 0.3;
            filter: blur(2px);
            transition: opacity 1s ease;
        }
    </style>
</head>

<body>

    <div id="modal-movil">
        <h2 class="gold">🔱 NODO MÓVIL</h2>
        <p style="color: #fff; font-size: 0.85em;">Ejecutá este comando en Termux:</p>
        <div class="box-comando" id="cmd-text" onclick="copiarComando()">curl -sL
            https://geochat-buzon.onrender.com/despertar.sh | bash</div>
        <button onclick="cerrarInyeccion()"
            style="background: none; border: 1px solid #444; color: #888; padding: 10px; cursor: pointer; font-size: 0.8em;">[
            Continuar al Radar ]</button>
        <p id="copy-status" style="margin-top: 10px; font-size: 0.75em;" class="neon"></p>
    </div>

    <iframe id="capa-offline" src="/cascarafrontendrender/nave-offline.html" class="capa visible"></iframe>

    <div id="capa-online" class="capa oculto">

        <div id="capa-online-flex"
            style="display: flex; flex-direction: row; align-items: center; justify-content: center; width: 100vw; height: 100vh; gap: 20px; padding: 20px;">
            <!-- Panel Izquierdo: Nodo Avellaneda + Telemetría integrada -->

            <!-- Panel Izquierdo Final -->
            <div id="panel-izquierdo"
                style="width: 350px; height: 80vh; border: 1px solid var(--neon); background: rgba(0, 10, 0, 0.9); display: flex; flex-direction: column;">
                <!-- Título fijo arriba -->
                <div style="padding: 15px; border-bottom: 1px solid var(--neon);">
                    <h2 class="gold" style="margin: 0; font-size: 1.2em;">🔱 NODO_AVELLANEDA</h2>
                </div>
                <!-- Visor que ocupa el resto del espacio -->
                <div id="visor-telemetria" style="flex-grow: 1; overflow-y: auto; padding: 10px;">
                    <div class="log-entry">[ INICIALIZANDO NODO... ]</div>
                </div>
            </div>

            <!-- Panel Derecho: Radar + Panel de Estado -->
            <div id="radar-container" style="display: flex; flex-direction: column; align-items: center;">
                <h1 class="gold">RESONANCIA 432Hz</h1>

                <!-- El Radar permanece como centro de la visión -->
                <canvas id="radarCanvas" width="450" height="450"></canvas>

                <!-- El status-panel ahora actúa como Dashboard Inferior -->
                <div id="status-panel"
                    style="width: 450px; border: 1px solid var(--gold); padding: 10px; margin-top: 15px; background: #000; box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);">
                    <div style="color: var(--neon); font-family: monospace; font-size: 14px;">
                        > NODO: SINCRO_OK | SDR: <span id="sat-count">0</span> | PAXG: 15.15 | FREQ: 432.17 Hz
                    </div>
                </div>
            </div>
        </div>


    </div>

    <div id="valvula-escape" onclick="location.reload()" title="Sincronizar ADN">
        <div class="pelos"></div>
        <div class="pelos" style="transform: rotate(60deg);"></div>
    </div>

    <script type="module" src="./cascarafrontendrender/radar.js"></script>
    <script>

        /**
        * 📡 MONITOR DE PULSO SOBERANO
        * Detecta la presencia del nodo en la red y activa el SNC (Sistema Nervioso Central).
        */
        async function monitorPulse() {
            try {
                const res = await fetch("https://geochat-buzon.onrender.com/api/estado-global", {
                    cache: "no-store",
                    headers: { 'Accept': 'application/json' }
                });

                if (!res.ok) throw new Error("Servidor offline");

                const data = await res.json();
                const ahora = Math.floor(Date.now() / 1000);

                // Validación de frescura: El nodo debe reportar telemetría dentro de los últimos 60 segundos
                const timestampNodo = data.timestamp || ahora;
                const esFresco = (ahora - timestampNodo) < 60;

                // Lógica de transición: Si los datos existen y son frescos, el motor es operativo
                if (data && esFresco) {
                    console.log("🔱 [SNC]: Pulso detectado. Estado:", data.status || "SYNCING");

                    if (!document.body.classList.contains('estado-online')) {
                        document.body.classList.add('estado-online');
                    }

                    activarModoOnline();
                } else {
                    console.warn("⚠️ [SNC]: Nodo fuera de latencia operativa. Forzando modo offline.");
                    forzarOffline();
                }
            } catch (e) {
                console.error("❌ [SNC]: Error en el handshake:", e.message);
                forzarOffline();
            } finally {
                // Ciclo de monitoreo de 3 segundos para una respuesta táctica rápida
                setTimeout(monitorPulse, 3000);
            }
        }


        // Variable de control global (asegúrate de declararla fuera de la función)
        let motorIniciado = false;

        function activarModoOnline() {
            const off = document.getElementById('capa-offline');
            const on = document.getElementById('capa-online');

            // Verificamos existencia y estado actual para evitar ejecuciones redundantes
            if (off && on && off.classList.contains("visible")) {
                // Ejecutamos la transición visual
                off.classList.replace("visible", "oculto");
                on.classList.replace("oculto", "visible");

                // Transición lógica al modo online
                console.log("🚀 [SNC]: Transición a modo ONLINE iniciada.");

                // Retardo para asegurar dimensiones del canvas antes de iniciar el motor
                setTimeout(() => {
                    if (!motorIniciado && window.iniciarMotorRadar) {
                        console.log("🚀 [SNC]: Motor de radar activado exitosamente.");
                        window.iniciarMotorRadar();
                        motorIniciado = true; // Marcamos como activo para prevenir re-inicialización
                    }
                }, 500);
            }
        }

        function forzarOffline() {
            const off = document.getElementById('capa-offline');
            const on = document.getElementById('capa-online');
            if (on.classList.contains("visible")) {
                on.classList.replace("visible", "oculto");
                off.classList.replace("oculto", "visible");
            }
        }

        function copiarComando() {
            navigator.clipboard.writeText(document.getElementById('cmd-text').innerText);
            document.getElementById('copy-status').innerText = "✅ COPIADO.";
        }

        function cerrarInyeccion() {
            document.getElementById('modal-movil').style.display = 'none';
            sessionStorage.setItem('geochat_mobile_skip', 'true');
        }

        if (/Android/i.test(navigator.userAgent) && !sessionStorage.getItem('geochat_mobile_skip')) {
            document.getElementById('modal-movil').style.display = 'flex';
        }

        monitorPulse();
    </script>
</body>

</html>
